{% for bill in monthly_billings %}
    <tr>
        <td data-label="Consumer">{{ bill.consumer.full_name }}</td>
        <td data-label="Total">&#8369;{{ bill.total_amount }}</td>
        <td data-label="Paid">&#8369;{{ bill.amount_paid }}</td>
        <td data-label="Status">{{ bill.panel_status_label|default:bill.get_status_display }}</td>
    </tr>
{% empty %}
    <tr><td colspan="4" class="empty-state">No billing records found for this month.</td></tr>
{% endfor %}
