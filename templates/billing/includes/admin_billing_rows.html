{% for bill in recent_bills %}
    <tr>
        <td data-label="Consumer">{{ bill.consumer.full_name }}</td>
        <td data-label="Month">{{ bill.billing_month|date:'F Y' }}</td>
        <td data-label="Total">&#8369;{{ bill.total_amount }}</td>
        <td data-label="Status">{{ bill.get_status_display }}</td>
    </tr>
{% empty %}
    <tr><td colspan="4" class="empty-state">No billing activity available.</td></tr>
{% endfor %}
