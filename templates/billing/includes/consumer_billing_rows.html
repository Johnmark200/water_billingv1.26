{% for bill in billing_records %}
    <tr>
        <td data-label="Month">{{ bill.billing_month|date:'F Y' }}</td>
        <td data-label="Previous">{{ bill.previous_reading }}</td>
        <td data-label="Current">{{ bill.current_reading }}</td>
        <td data-label="Total">&#8369;{{ bill.total_amount }}</td>
        <td data-label="Paid">&#8369;{{ bill.amount_paid }}</td>
        <td data-label="Status">{{ bill.get_status_display }}</td>
    </tr>
{% empty %}
    <tr><td colspan="6" class="empty-state">No billing records available.</td></tr>
{% endfor %}
