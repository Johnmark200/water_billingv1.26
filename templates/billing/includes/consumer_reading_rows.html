{% for reading in meter_readings %}
    <tr>
        <td data-label="Month">{{ reading.billing_month|date:'F Y' }}</td>
        <td data-label="Previous">{{ reading.previous_reading }}</td>
        <td data-label="Current">{{ reading.current_reading }}</td>
        <td data-label="Usage">{{ reading.usage_m3 }} m³</td>
        <td data-label="Reading Date">{{ reading.reading_date }}</td>
    </tr>
{% empty %}
    <tr><td colspan="5" class="empty-state">No meter readings available.</td></tr>
{% endfor %}
