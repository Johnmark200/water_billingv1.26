{% for payment in monthly_payments %}
    <tr>
        <td data-label="Consumer">{{ payment.consumer.full_name }}</td>
        <td data-label="Method">{{ payment.display_payment_method }}</td>
        <td data-label="Option">{{ payment.get_payment_option_display }}</td>
        <td data-label="Amount">&#8369;{{ payment.amount_paid }}</td>
        <td data-label="Status">{{ payment.get_status_display }}</td>
        <td data-label="Receipt"><a href="{% url 'payment_receipt' payment.id %}" class="btn secondary">View</a></td>
    </tr>
{% empty %}
    <tr><td colspan="6" class="empty-state">No payments found for this month.</td></tr>
{% endfor %}
